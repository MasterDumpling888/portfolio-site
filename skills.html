<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Character Stats - Technical Skills of Rachel"
    />
    <title>Rachel's Quest - Skill Log</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/components/navigation.css" />
    <link rel="stylesheet" href="css/components/footer.css" />

    <link rel="stylesheet" href="css/components/theme-switcher.css" />
    <link rel="stylesheet" href="css/components/buttons.css" />
    <link rel="stylesheet" href="css/pages/skills.css" />

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body data-theme="dark">
    <!-- Global Effects -->
    <div class="global-bg"></div>
    <div id="particles-js"></div>
    <div class="scanline"></div>

    <!-- Navigation Root -->
    <div id="header-root"></div>

    <!-- Main Content -->
    <main id="main-content" class="main-content skills-page">
      <section class="stats-screen container">
        <div class="stats-layout">
          <!-- Left: Character Preview -->
          <div class="character-preview">
            <div class="preview-box">
              <div id="active-character" class="active-character-sprite">
                <!-- Character injected by JS -->
              </div>
              <div class="character-info">
                <h2 id="character-name" class="character-name">
                  UNIT_UNDEFINED
                </h2>
                <p id="character-class" class="character-class">CLASS_NULL</p>
              </div>
            </div>
          </div>

          <!-- Right: Skill Modules -->
          <div class="skills-modules">
            <h2 class="section-heading">MODULE_PROFICIENCY</h2>
            <div id="skills-container" class="modules-grid">
              <!-- Skills injected by JS -->
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer Root -->
    <div id="footer-root"></div>

    <!-- JavaScript -->
    <!-- particles.js by Vincent Garreau: https://github.com/VincentGarreau/particles.js/ -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
