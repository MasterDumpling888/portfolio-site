<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Character Stats - Technical Skills of Rachel"
    />
    <title>Rachel's Quest - Skill Log</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/components/navigation.css" />
    <link rel="stylesheet" href="css/components/theme-switcher.css" />
    <link rel="stylesheet" href="css/components/buttons.css" />
    <link rel="stylesheet" href="css/pages/skills.css" />

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body data-theme="dark">
    <!-- Global Effects -->
    <div class="starfield"></div>
    <div class="scanline"></div>

    <!-- Cosmic Terminal Header -->
    <header class="fixed-header">
      <div class="header-container">
        <div class="terminal-logo">
          <i data-lucide="terminal" class="text-primary"></i>
          <h1 class="terminal-title">RACHEL_S_LOG_835</h1>
        </div>

        <nav class="desktop-nav">
          <ul class="nav-menu" id="nav-menu">
            <li><a href="index.html" class="nav-link">SYSTEM_BOOT</a></li>
            <li><a href="projects.html" class="nav-link">EXPLORE_VOID</a></li>
            <li><a href="skills.html" class="nav-link active">SKILL_LOG</a></li>
            <li><a href="contact.html" class="nav-link">SIGNAL_LOG</a></li>
          </ul>
        </nav>

        <div class="header-actions">
          <button id="theme-toggle" class="icon-btn">
            <i data-lucide="settings-2"></i>
          </button>
          <button id="mobile-menu-toggle" class="icon-btn mobile-only">
            <i data-lucide="menu"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="main-content skills-page">
      <section class="stats-screen container">
        <div class="stats-layout">
          <!-- Left: Character Preview -->
          <div class="character-preview">
            <div class="preview-box">
              <div id="active-character" class="active-character-sprite">
                <!-- Character injected by JS -->
              </div>
              <div class="character-info">
                <h2 id="character-name" class="character-name">
                  UNIT_UNDEFINED
                </h2>
                <p id="character-class" class="character-class">CLASS_NULL</p>
              </div>
            </div>
          </div>

          <!-- Right: Skill Modules -->
          <div class="skills-modules">
            <h2 class="section-heading">MODULE_PROFICIENCY</h2>
            <div id="skills-container" class="modules-grid">
              <!-- Skills injected by JS -->
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav mobile-only">
      <a href="index.html" class="nav-link"
        ><i data-lucide="rocket"></i><span>DECK</span></a
      >
      <a href="projects.html" class="nav-link"
        ><i data-lucide="database"></i><span>DATA</span></a
      >
      <a href="skills.html" class="nav-link active"
        ><i data-lucide="palette"></i><span>ART</span></a
      >
      <a href="contact.html" class="nav-link"
        ><i data-lucide="dialpad"></i><span>COMMS</span></a
      >
    </nav>

    <!-- JavaScript -->
    <script type="module" src="js/main.js"></script>
  </body>
</html>
