<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Signal Transmission - Contact Rachel"
    />
    <title>Rachel's Quest - Signal Log</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/components/navigation.css" />
    <link rel="stylesheet" href="css/components/theme-switcher.css" />
    <link rel="stylesheet" href="css/components/buttons.css" />
    <link rel="stylesheet" href="css/pages/contact.css" />

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body data-theme="dark">
    <!-- Global Effects -->
    <div class="starfield"></div>
    <div class="scanline"></div>

    <!-- Cosmic Terminal Header -->
    <header class="fixed-header">
      <div class="header-container">
        <div class="terminal-logo">
          <i data-lucide="terminal" class="text-primary"></i>
          <h1 class="terminal-title">COSMIC_TERMINAL_V1.0</h1>
        </div>
        
        <nav class="desktop-nav">
          <ul class="nav-menu" id="nav-menu">
            <li><a href="index.html" class="nav-link">SYSTEM_BOOT</a></li>
            <li><a href="projects.html" class="nav-link">EXPLORE_VOID</a></li>
            <li><a href="skills.html" class="nav-link">SKILL_LOG</a></li>
            <li><a href="contact.html" class="nav-link active">SIGNAL_LOG</a></li>
          </ul>
        </nav>

        <div class="header-actions">
          <button id="theme-toggle" class="icon-btn"><i data-lucide="settings-2"></i></button>
          <button id="mobile-menu-toggle" class="icon-btn mobile-only"><i data-lucide="menu"></i></button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="main-content contact-page">
      <section class="transmission-screen container">
        <div class="terminal-container">
          <!-- Narrator Box -->
          <div id="contact-narrator" class="contact-narrator">
            <!-- Narrator text injected by JS -->
          </div>

          <!-- The Interface -->
          <div class="comms-interface">
            <!-- Display Screen -->
            <div class="dial-screen">
              <div class="screen-label">SIGNAL_TARGET</div>
              <div id="dial-display" class="dial-display">READY_FOR_INPUT</div>
              <div class="screen-status"><span class="blink">_</span></div>
            </div>

            <!-- Keypad Grid -->
            <div class="keypad-grid">
              <button class="key-btn" data-key="1" data-method="email">
                <span class="key-num">1</span>
                <span class="key-label">EMAIL</span>
              </button>
              <button class="key-btn" data-key="2" data-method="github">
                <span class="key-num">2</span>
                <span class="key-label">GITHUB</span>
              </button>
              <button class="key-btn" data-key="3" data-method="linkedin">
                <span class="key-num">3</span>
                <span class="key-label">LINKEDIN</span>
              </button>
              <button class="key-btn" data-key="4">
                <span class="key-num">4</span>
                <span class="key-label">STATS</span>
              </button>
              <button class="key-btn" data-key="5">
                <span class="key-num">5</span>
                <span class="key-label">VOID</span>
              </button>
              <button class="key-btn" data-key="6">
                <span class="key-num">6</span>
                <span class="key-label">DASH</span>
              </button>
              <button class="key-btn" data-key="7">
                <span class="key-num">7</span>
                <span class="key-label">SYS</span>
              </button>
              <button class="key-btn" data-key="8">
                <span class="key-num">8</span>
                <span class="key-label">LOG</span>
              </button>
              <button class="key-btn" data-key="9">
                <span class="key-num">9</span>
                <span class="key-label">CLR</span>
              </button>
              <button class="key-btn action-key" id="clear-btn">
                <span class="key-label">X</span>
              </button>
              <button class="key-btn" data-key="0">
                <span class="key-num">0</span>
                <span class="key-label">NET</span>
              </button>
              <button class="key-btn action-key" id="call-btn">
                <i data-lucide="phone-forwarded"></i>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav mobile-only">
      <a href="index.html" class="nav-link"><i data-lucide="rocket"></i><span>DECK</span></a>
      <a href="projects.html" class="nav-link"><i data-lucide="database"></i><span>DATA</span></a>
      <a href="skills.html" class="nav-link"><i data-lucide="palette"></i><span>ART</span></a>
      <a href="contact.html" class="nav-link active"><i data-lucide="dialpad"></i><span>COMMS</span></a>
    </nav>

    <!-- JavaScript -->
    <script type="module" src="js/main.js"></script>
  </body>
</html>
