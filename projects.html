<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Project Logs - Exploration of the Digital Nebula"
    />
    <title>Rachel's Quest - Explore Void</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/components/navigation.css" />
    <link rel="stylesheet" href="css/components/footer.css" />

    <link rel="stylesheet" href="css/components/theme-switcher.css" />
    <link rel="stylesheet" href="css/components/buttons.css" />
    <link rel="stylesheet" href="css/components/project-card.css" />
    <link rel="stylesheet" href="css/components/narrator.css" />
    <link rel="stylesheet" href="css/pages/projects.css" />

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body data-theme="dark">
    <!-- Global Effects -->
    <div class="global-bg"></div>
    <div id="particles-js"></div>

    <!-- Navigation Root -->
    <div id="header-root"></div>

    <!-- Global Narrator -->
    <div id="narrator-root"></div>

    <!-- Main Content -->
    <main id="main-content" class="main-content projects-page">
      <!-- Filter Section -->
      <section class="projects-filter container">
        <div class="filter-header">
          <h2 class="section-heading">PROJECT_LOG</h2>
        </div>
        <div class="filter-container">
          <div class="filter-buttons" id="filter-buttons">
            <button class="filter-btn active" data-filter="all">
              <span>ALL_DATA</span>
            </button>
            <button class="filter-btn" data-filter="webdev">
              <span>WEB_NODES</span>
            </button>
            <button class="filter-btn" data-filter="ai">
              <span>AI_CORES</span>
            </button>
            <button class="filter-btn" data-filter="fintech">
              <span>FIN_LOGIC</span>
            </button>
            <button class="filter-btn" data-filter="medtech">
              <span>MED_SIGNALS</span>
            </button>
          </div>
        </div>
      </section>

      <!-- Projects Grid -->
      <section class="projects-section container">
        <div id="projects-container" class="projects-grid">
          <!-- Projects will be dynamically loaded here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state hidden">
          <p>ERROR: NO_DATA_MATCHES_QUERY</p>
        </div>
      </section>
    </main>

    <!-- Footer Root -->
    <div id="footer-root"></div>

    <!-- JavaScript -->
    <!-- particles.js by Vincent Garreau: https://github.com/VincentGarreau/particles.js/ -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
