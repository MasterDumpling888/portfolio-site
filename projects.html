<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Projects by [Your Name] - Web Development, AI/ML, FinTech, and MedTech projects"
    />
    <title>Projects - [Your Name]</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/components/navigation.css" />
    <link rel="stylesheet" href="css/components/theme-switcher.css" />
    <link rel="stylesheet" href="css/components/buttons.css" />
    <link rel="stylesheet" href="css/components/project-card.css" />
    <link rel="stylesheet" href="css/pages/projects.css" />

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body data-theme="dark">
    <!-- Navigation -->
    <nav id="main-navigation" class="navigation">
      <div class="nav-container">
        <a href="index.html" class="nav-logo">
          <img src="assets/images/logo.png" alt="Logo" class="logo-image" />
        </a>

        <button
          class="mobile-menu-toggle"
          id="mobile-menu-toggle"
          aria-label="Toggle menu"
        >
          <i data-lucide="menu"></i>
        </button>

        <ul class="nav-menu" id="nav-menu">
          <li>
            <a href="index.html" class="nav-link">
              <i data-lucide="home"></i>
              <span>Home</span>
            </a>
          </li>
          <li>
            <a href="projects.html" class="nav-link active">
              <i data-lucide="folder"></i>
              <span>Projects</span>
            </a>
          </li>
          <li>
            <a href="skills.html" class="nav-link">
              <i data-lucide="code-2"></i>
              <span>Skills</span>
            </a>
          </li>
          <li>
            <a href="contact.html" class="nav-link">
              <i data-lucide="mail"></i>
              <span>Contact</span>
            </a>
          </li>
        </ul>

        <button
          class="theme-toggle"
          id="theme-toggle"
          aria-label="Toggle theme"
        >
          <i data-lucide="sun" class="theme-icon light"></i>
          <i data-lucide="moon" class="theme-icon dark"></i>
        </button>
      </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="main-content projects-page">
      <!-- Page Header -->
      <section class="page-header">
        <div class="header-container">
          <h1 class="page-title animate-fade-in">
            <span class="title-number">02.</span>
            Projects
          </h1>
          <p class="page-description">
            A collection of projects spanning Web Development, AI/ML, FinTech,
            and MedTech
          </p>
        </div>
      </section>

      <!-- Filter Section -->
      <section class="projects-filter">
        <div class="filter-container">
          <div class="filter-buttons" id="filter-buttons">
            <button class="filter-btn active" data-filter="all">
              <i data-lucide="grid-3x3"></i>
              <span>All Projects</span>
            </button>
            <button class="filter-btn" data-filter="webdev">
              <i data-lucide="layout"></i>
              <span>Web Dev</span>
            </button>
            <button class="filter-btn" data-filter="ai">
              <i data-lucide="cpu"></i>
              <span>AI/ML</span>
            </button>
            <button class="filter-btn" data-filter="fintech">
              <i data-lucide="trending-up"></i>
              <span>FinTech</span>
            </button>
            <button class="filter-btn" data-filter="medtech">
              <i data-lucide="heart-pulse"></i>
              <span>MedTech</span>
            </button>
          </div>
        </div>
      </section>

      <!-- Projects Grid -->
      <section class="projects-section">
        <div class="section-container">
          <div id="projects-container" class="projects-grid">
            <!-- Projects will be dynamically loaded here -->
          </div>

          <!-- Empty State -->
          <div id="empty-state" class="empty-state hidden">
            <i data-lucide="folder-x"></i>
            <p>No projects found for this filter</p>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="footer-container">
        <p class="footer-text">
          Designed & Built by <span class="highlight">[Your Name]</span>
        </p>
        <p class="footer-subtext">© 2025 All rights reserved</p>
      </div>
    </footer>

    <!-- JavaScript -->
    <script type="module" src="js/main.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
