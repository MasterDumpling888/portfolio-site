<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Project Logs - Exploration of the Digital Nebula"
    />
    <title>Rachel's Quest - Explore Void</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/components/navigation.css" />
    <link rel="stylesheet" href="css/components/theme-switcher.css" />
    <link rel="stylesheet" href="css/components/buttons.css" />
    <link rel="stylesheet" href="css/components/project-card.css" />
    <link rel="stylesheet" href="css/pages/projects.css" />

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body data-theme="dark">
    <!-- Global Effects -->
    <div class="starfield"></div>
    <div class="scanline"></div>

    <!-- Cosmic Terminal Header -->
    <header class="fixed-header">
      <div class="header-container">
        <div class="terminal-logo">
          <i data-lucide="terminal" class="text-primary"></i>
          <h1 class="terminal-title">COSMIC_TERMINAL_V1.0</h1>
        </div>
        
        <nav class="desktop-nav">
          <ul class="nav-menu" id="nav-menu">
            <li><a href="index.html" class="nav-link">SYSTEM_BOOT</a></li>
            <li><a href="projects.html" class="nav-link active">EXPLORE_VOID</a></li>
            <li><a href="skills.html" class="nav-link">SKILL_LOG</a></li>
            <li><a href="contact.html" class="nav-link">SIGNAL_LOG</a></li>
          </ul>
        </nav>

        <div class="header-actions">
          <button id="theme-toggle" class="icon-btn"><i data-lucide="settings-2"></i></button>
          <button id="mobile-menu-toggle" class="icon-btn mobile-only"><i data-lucide="menu"></i></button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="main-content projects-page">
      <!-- Filter Section -->
      <section class="projects-filter container">
        <div class="filter-header">
          <h2 class="section-heading">DATA_QUERY_FILTERS</h2>
        </div>
        <div class="filter-container">
          <div class="filter-buttons" id="filter-buttons">
            <button class="filter-btn active" data-filter="all">
              <span>ALL_DATA</span>
            </button>
            <button class="filter-btn" data-filter="webdev">
              <span>WEB_NODES</span>
            </button>
            <button class="filter-btn" data-filter="ai">
              <span>AI_CORES</span>
            </button>
            <button class="filter-btn" data-filter="fintech">
              <span>FIN_LOGIC</span>
            </button>
            <button class="filter-btn" data-filter="medtech">
              <span>MED_SIGNALS</span>
            </button>
          </div>
        </div>
      </section>

      <!-- Projects Grid -->
      <section class="projects-section container">
        <div id="projects-container" class="projects-grid">
          <!-- Projects will be dynamically loaded here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state hidden">
          <p>ERROR: NO_DATA_MATCHES_QUERY</p>
        </div>
      </section>
    </main>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav mobile-only">
      <a href="index.html" class="nav-link"><i data-lucide="rocket"></i><span>DECK</span></a>
      <a href="projects.html" class="nav-link active"><i data-lucide="database"></i><span>DATA</span></a>
      <a href="skills.html" class="nav-link"><i data-lucide="palette"></i><span>ART</span></a>
      <a href="contact.html" class="nav-link"><i data-lucide="dialpad"></i><span>COMMS</span></a>
    </nav>

    <!-- JavaScript -->
    <script type="module" src="js/main.js"></script>
  </body>
</html>
