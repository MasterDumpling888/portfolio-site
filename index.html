<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Rachel's Quest - A Journey through Tech and Art"
    />
    <title>Rachel's Quest</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/components/navigation.css" />
    <link rel="stylesheet" href="css/components/theme-switcher.css" />
    <link rel="stylesheet" href="css/components/buttons.css" />
    <link rel="stylesheet" href="css/pages/home.css" />

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body data-theme="dark">
    <!-- Global Effects -->
    <div class="starfield"></div>
    <div class="scanline"></div>

    <!-- Cosmic Terminal Header -->
    <header class="fixed-header">
      <div class="header-container">
        <div class="terminal-logo">
          <i data-lucide="terminal" class="text-primary"></i>
          <h1 class="terminal-title">COSMIC_TERMINAL_V1.0</h1>
        </div>
        
        <nav class="desktop-nav">
          <ul class="nav-menu" id="nav-menu">
            <li><a href="index.html" class="nav-link">SYSTEM_BOOT</a></li>
            <li><a href="projects.html" class="nav-link">EXPLORE_VOID</a></li>
            <li><a href="skills.html" class="nav-link">SKILL_LOG</a></li>
            <li><a href="contact.html" class="nav-link">SIGNAL_LOG</a></li>
          </ul>
        </nav>

        <div class="header-actions">
          <button id="theme-toggle" class="icon-btn"><i data-lucide="settings-2"></i></button>
          <button id="mobile-menu-toggle" class="icon-btn mobile-only"><i data-lucide="menu"></i></button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
      <!-- Intro / Avatar Selection -->
      <section id="hero" class="hero-section">
        <div id="narrator-container" class="narrator-container animate-fade-in">
          <!-- Narrator sequence will be injected by JS -->
        </div>

        <div id="avatar-selection" class="avatar-selection hidden">
          <!-- Selection cards will be injected by JS -->
        </div>
      </section>

      <!-- The Journey Sections (Content loaded via JS) -->
      <div id="journey-content" class="journey-content hidden">
        <!-- Parallax layers and sections -->
      </div>
    </main>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav mobile-only">
      <a href="index.html" class="nav-link"><i data-lucide="rocket"></i><span>DECK</span></a>
      <a href="projects.html" class="nav-link"><i data-lucide="database"></i><span>DATA</span></a>
      <a href="skills.html" class="nav-link"><i data-lucide="palette"></i><span>ART</span></a>
      <a href="contact.html" class="nav-link"><i data-lucide="dialpad"></i><span>COMMS</span></a>
    </nav>

    <!-- Side Stats (Desktop Decoration) -->
    <aside class="side-stats desktop-only">
      <div class="stats-box">
        <div class="stat-line">COORD_X: <span id="coord-x">0</span></div>
        <div class="stat-line">COORD_Y: <span id="coord-y">0</span></div>
        <div class="stat-line">STABILITY: 98%</div>
        <div class="stat-progress"><div class="progress-bar"></div></div>
      </div>
      <div class="session-label">SESSION_ACTIVE</div>
    </aside>

    <!-- JavaScript -->
    <script type="module" src="js/main.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
