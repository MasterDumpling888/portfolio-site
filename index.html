<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Rachel's Quest - A Journey through Tech and Art"
    />
    <title>Rachel's Quest</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/components/navigation.css" />
    <link rel="stylesheet" href="css/components/footer.css" />
    <link rel="stylesheet" href="css/components/theme-switcher.css" />
    <link rel="stylesheet" href="css/components/buttons.css" />
    <link rel="stylesheet" href="css/components/narrator.css" />
    <link rel="stylesheet" href="css/pages/home.css" />

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body data-theme="dark">
    <!-- Global Effects -->
    <div class="global-bg"></div>
    <div id="particles-js"></div>
    <div class="scanline"></div>

    <!-- Navigation Root -->
    <div id="header-root"></div>

    <!-- Global Narrator -->
    <div id="narrator-root"></div>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
      <!-- Intro / Avatar Selection -->
      <section id="hero" class="hero-section">
        <div id="narrator-container" class="narrator-container animate-fade-in">
          <!-- Narrator sequence will be injected by JS -->
        </div>

        <div id="avatar-selection" class="avatar-selection hidden">
          <!-- Selection cards will be injected by JS -->
        </div>
      </section>

      <!-- The Journey Sections (Content loaded via JS) -->
      <div id="journey-content" class="journey-content hidden">
        <!-- Parallax layers and sections -->
      </div>
    </main>

    <!-- Footer Root -->
    <div id="footer-root"></div>

    <!-- Side Stats (Desktop Decoration) -->
    <aside class="side-stats desktop-only">
      <div class="stats-box">
        <div class="stat-line">COORD_X: <span id="coord-x">0</span></div>
        <div class="stat-line">COORD_Y: <span id="coord-y">0</span></div>
        <div class="stat-line">STABILITY: 98%</div>
        <div class="stat-progress"><div class="progress-bar"></div></div>
      </div>
      <div class="session-label">SESSION_ACTIVE</div>
    </aside>

    <!-- JavaScript -->
    <!-- particles.js by Vincent Garreau: https://github.com/VincentGarreau/particles.js/ -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
